name: Release

on:
  push:
    tags:
      - 'v*' # v0.1.0, v0.2.0, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create a GitHub release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Generate icons
        run: npm run icons

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build & package
        run: npm run package

      - name: Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: openscreenshot-v${{ env.VERSION }}.zip
          extension-id: hdabbojjccojlapnfjpdppcpfcnhgmdp
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenScreenShot ${{ github.ref_name }}
          body: |
            **OpenScreenShot ${{ github.ref_name }}**

            [Install from the Chrome Web Store](https://chromewebstore.google.com/detail/hdabbojjccojlapnfjpdppcpfcnhgmdp)

            ### Changelog
            See the commit log for details.
          files: openscreenshot-*.zip
          generate_release_notes: true
